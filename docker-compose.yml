services:
  mongodb:
    image: mongo:7.0
    container_name: franchise-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: franchise-api
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/franchise_db}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  mongo_data: